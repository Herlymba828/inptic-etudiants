# ============================================================
# Jenkins Configuration as Code (JCasC)
# ============================================================

jenkins:
  systemMessage: |
    INPTIC RH — Jenkins CI/CD
    Pipeline automatique sur push Git

  numExecutors: 4
  mode: NORMAL
  scmCheckoutRetryCount: 2

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          name: "Administrateur INPTIC"
          password: "${JENKINS_ADMIN_PASSWORD:-JenkinsInptic2024}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

tool:
  git:
    installations:
      - name: "Default"
        home: "git"

unclassified:
  location:
    url: "http://localhost:8080/"
    adminAddress: "herlymba828@gmail.com"

  timestamperConfig:
    allPipelines: true
