# ============================================================
# Credentials Jenkins — injectés depuis les variables d'env
# ============================================================
credentials:
  system:
    domainCredentials:
      - credentials:

          # Token API de l'application INPTIC RH
          - string:
              scope: GLOBAL
              id: "inptic-api-token"
              description: "Bearer token pour l'API INPTIC RH"
              secret: "${API_TOKEN}"

          # Credentials GitHub/GitLab pour le checkout
          - usernamePassword:
              scope: GLOBAL
              id: "git-credentials"
              description: "Credentials Git (username + token)"
              username: "${GIT_USERNAME:-git}"
              password: "${GIT_TOKEN:-}"

          # Mot de passe Gmail pour les notifications Jenkins
          - usernamePassword:
              scope: GLOBAL
              id: "gmail-credentials"
              description: "Gmail SMTP pour les notifications de build"
              username: "${GMAIL_USER}"
              password: "${GMAIL_APP_PASSWORD}"
