apiVersion: 1

# ============================================================
# Grafana Unified Alerting — Contact points
# ============================================================
# NOTE: Les variables d'environnement ne fonctionnent pas dans les fichiers
# de provisioning Grafana. Vous devez configurer les contact points
# manuellement via l'interface Grafana ou mettre une adresse email en dur.
# ============================================================

contactPoints:
  - orgId: 1
    name: email-inptic-rh
    receivers:
      - uid: email-inptic-rh-receiver
        type: email
        settings:
          addresses: admin@example.com
          singleEmail: true
        disableResolveMessage: false

# ============================================================
# Notification policies
# ============================================================
policies:
  - orgId: 1
    receiver: email-inptic-rh
    group_by: ['alertname', 'grafana_folder']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: email-inptic-rh
        object_matchers:
          - ['severity', '=', 'critical']
        group_wait: 10s
        repeat_interval: 1h
      - receiver: email-inptic-rh
        object_matchers:
          - ['severity', '=', 'warning']
        group_wait: 30s
        repeat_interval: 4h
