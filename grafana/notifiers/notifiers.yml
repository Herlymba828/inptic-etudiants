apiVersion: 1

# ============================================================
# Grafana Legacy Alerting — Notification channels (deprecated)
# Conservé pour compatibilité avec les anciens dashboards
# ============================================================
notifiers:
  - name: Email INPTIC RH
    type: email
    uid: email-legacy
    org_id: 1
    is_default: true
    send_reminder: true
    frequency: 4h
    disable_resolve_message: false
    settings:
      addresses: ${NOTIFICATION_EMAIL}
      singleEmail: true
      autoResolve: true
