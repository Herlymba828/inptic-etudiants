global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: 'inptic-monitor'

# Alertmanager configuration (optionnel, peut être activé plus tard)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Règles d'alerte (optionnel)
# rule_files:
#   - 'alerts/*.yml'

scrape_configs:
  - job_name: 'flask-app'
    scrape_interval: 5s
    static_configs:
      - targets: ['app:5000']
        labels:
          service: 'gestion-etudiants'
          environment: 'production'
    metrics_path: '/metrics'
    scheme: 'http'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
